<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delhi Sales Dashboard YTD 2026</title>

<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#0b0b0b;min-height:100vh}
  .header{background:#fff;border-bottom:1px solid #e5e5e2;padding:20px 32px;display:flex;align-items:center;gap:16px}
  .logo{width:32px;height:32px;background:#d4502a;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;flex-shrink:0}
  .header-text h1{font-size:18px;font-weight:600;color:#0b0b0b}
  .header-text p{font-size:13px;color:#6b6a66;margin-top:2px}
  .search-section{padding:32px 32px 0;max-width:900px;margin:0 auto}
  .search-wrap{position:relative}
  .search-wrap svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#6b6a66;pointer-events:none}
  #searchInput{width:100%;padding:12px 14px 12px 44px;font-size:15px;border:1.5px solid #d9d8d3;border-radius:10px;background:#fff;outline:none;transition:border-color .15s}
  #searchInput:focus{border-color:#2a78d6}
  #suggestions{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1px solid #e5e5e2;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.08);z-index:100;max-height:280px;overflow-y:auto;display:none}
  .suggestion-item{padding:10px 16px;cursor:pointer;font-size:14px;border-bottom:1px solid #f0efec;transition:background .1s}
  .suggestion-item:last-child{border-bottom:none}
  .suggestion-item:hover{background:#f5f5f3}
  .suggestion-item strong{color:#0b0b0b}
  .suggestion-item span{color:#6b6a66;font-size:12px;margin-left:6px}
  .main{padding:24px 32px 48px;max-width:900px;margin:0 auto}
  .empty-state{text-align:center;padding:80px 0;color:#6b6a66}
  .empty-state h2{font-size:20px;font-weight:500;color:#0b0b0b;margin-bottom:8px}
  .empty-state p{font-size:14px}
  .outlet-header{background:#fff;border:1px solid #e5e5e2;border-radius:12px;padding:20px 24px;margin-bottom:20px}
  .outlet-name{font-size:20px;font-weight:600;margin-bottom:6px}
  .outlet-meta{display:flex;flex-wrap:wrap;gap:8px}
  .badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500}
  .badge-active{background:#eaf3de;color:#3b6d11}
  .badge-closed{background:#fcebeb;color:#a32d2d}
  .badge-billing{background:#faeeda;color:#854f0b}
  .badge-temp{background:#e6f1fb;color:#185fa5}
  .badge-inactive{background:#f1f0e8;color:#5f5e5a}
  .badge-channel{background:#eeedfe;color:#3c3489}
  .badge-rm{background:#f1f0e8;color:#444441}
  .kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:20px}
  .kpi-card{background:#fff;border:1px solid #e5e5e2;border-radius:10px;padding:14px 16px}
  .kpi-label{font-size:11px;color:#898781;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
  .kpi-value{font-size:24px;font-weight:600;color:#0b0b0b;line-height:1}
  .kpi-sub{font-size:11px;color:#6b6a66;margin-top:4px}
  .charts-grid{display:grid;gap:16px}
  .chart-card{background:#fff;border:1px solid #e5e5e2;border-radius:12px;padding:20px 24px}
  .chart-title{font-size:14px;font-weight:500;color:#0b0b0b;margin-bottom:4px}
  .chart-sub{font-size:12px;color:#898781;margin-bottom:16px}
  .legend{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:14px}
  .legend-item{display:flex;align-items:center;gap:5px;font-size:12px;color:#52514e}
  .legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
  .monthly-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:4px}
  .monthly-table th{font-size:11px;color:#898781;font-weight:500;padding:6px 10px;text-align:right;border-bottom:1px solid #e5e5e2}
  .monthly-table th:first-child{text-align:left}
  .monthly-table td{padding:8px 10px;border-bottom:1px solid #f0efec;text-align:right;color:#0b0b0b}
  .monthly-table td:first-child{text-align:left;font-weight:500;color:#52514e}
  .monthly-table tr:last-child td{border-bottom:none;font-weight:600;color:#0b0b0b;background:#f9f9f7}
  .trend-badge{display:inline-block;font-size:11px;padding:2px 6px;border-radius:4px;margin-left:4px}
  .trend-up{background:#eaf3de;color:#3b6d11}
  .trend-down{background:#fcebeb;color:#a32d2d}
  .trend-flat{background:#f1f0e8;color:#5f5e5a}
  .no-data{text-align:center;padding:40px;color:#898781;font-size:14px}
  @media(max-width:600px){
    .header{padding:16px};
    .search-section,.main{padding:16px 16px 0}
    .main{padding:16px}
    .kpi-row{grid-template-columns:1fr 1fr}
  }
</style>
</head>

function processData(raw) {
  return raw.map(r => {
    const name=r[0],rm=r[1],status=r[2],channel=r[3];
    const months=r.slice(4);
    const monthly=months.map(m=>({bud:m[0],mag:m[1],cor:m[2],hoe:m[3],total:m[0]+m[1]+m[2]+m[3]}));
    const ytd={bud:0,mag:0,cor:0,hoe:0,total:0};
    monthly.forEach(m=>{ytd.bud+=m.bud;ytd.mag+=m.mag;ytd.cor+=m.cor;ytd.hoe+=m.hoe;ytd.total+=m.total});
    return {name,rm,status,channel,monthly,ytd};
  });
}

const DATA = processData(RAW);

function normalize(s){return s.toLowerCase().replace(/[^a-z0-9]/g,' ').replace(/\s+/g,' ').trim()}

function search(q){
  if(!q||q.length<2) return [];
  const nq=normalize(q);
  return DATA.filter(d=>normalize(d.name).includes(nq)).slice(0,20);
}

const input=document.getElementById('searchInput');
const sugg=document.getElementById('suggestions');
const main=document.getElementById('mainContent');
let charts=[];

function clearCharts(){charts.forEach(c=>{try{c.destroy()}catch(e){}});charts=[];}

input.addEventListener('input',()=>{
  const q=input.value.trim();
  if(q.length<2){sugg.style.display='none';return;}
  const results=search(q);
  if(!results.length){sugg.style.display='none';return;}
  sugg.innerHTML=results.map(d=>`<div class="suggestion-item" data-name="${d.name}"><strong>${d.name}</strong><span>${d.channel} · ${d.rm}</span></div>`).join('');
  sugg.style.display='block';
});

sugg.addEventListener('click',e=>{
  const item=e.target.closest('.suggestion-item');
  if(!item)return;
  const name=item.dataset.name;
  const outlet=DATA.find(d=>d.name===name);
  input.value=name;
  sugg.style.display='none';
  if(outlet)renderOutlet(outlet);
});

document.addEventListener('click',e=>{if(!e.target.closest('.search-wrap'))sugg.style.display='none';});

input.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    const q=input.value.trim();
    const results=search(q);
    if(results.length===1){input.value=results[0].name;sugg.style.display='none';renderOutlet(results[0]);}
  }
});

function statusBadge(s){
  const map={'Active':'badge-active','Closed':'badge-closed','Billing Issue':'badge-billing','Temp Closed':'badge-temp','Inactive':'badge-inactive','UB Tieup':'badge-billing','Billing issue':'badge-billing'};
  return `<span class="badge ${map[s]||'badge-inactive'}">${s}</span>`;
}

function calcTrend(monthly){
  const active=monthly.filter(m=>m.total>0);
  if(active.length<2)return 'flat';
  const avg=t=>t.reduce((a,m)=>a+m.total,0)/t.length;
  const first=active.slice(0,Math.ceil(active.length/2));
  const last=active.slice(Math.floor(active.length/2));
  const diff=avg(last)-avg(first);
  if(diff>0)return 'up';if(diff<0)return 'down';return 'flat';
}

function forecast(monthly){
  const totals=monthly.map(m=>m.total);
  const nonzero=totals.filter(v=>v>0);
  if(!nonzero.length)return 0;
  // Weighted average - recent months get more weight
  const weights=[1,1.5,2,2.5,3];
  let wsum=0,wval=0;
  totals.forEach((v,i)=>{wsum+=weights[i];wval+=v*weights[i];});
  return Math.round(wval/wsum);
}

function skuForecast(monthly,key){
  const vals=monthly.map(m=>m[key]);
  const nonzero=vals.filter(v=>v>0);
  if(!nonzero.length)return 0;
  const weights=[1,1.5,2,2.5,3];
  let wsum=0,wval=0;
  vals.forEach((v,i)=>{wsum+=weights[i];wval+=v*weights[i];});
  return Math.round(wval/wsum);
}
